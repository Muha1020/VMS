{% extends 'base.html' %}

{% block content %}
<div class="premium-card-shell" style="max-width: 500px; margin: 4rem auto;">
    <div class="premium-card-core">
        <h2 class="premium-title">Reset Password</h2>
        <p class="premium-subtitle">Enter your email to receive a reset link.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="premium-form-group">
                <label for="id_email">Email Address</label>
                <input type="email" name="email" id="id_email" class="premium-input" required>
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" class="premium-btn w-100">
                    Send Link
                    <div class="icon-wrapper">
                        <i class="ph ph-envelope-simple"></i>
                    </div>
                </button>
            </div>
        </form>
        
        <div style="margin-top: 2rem; text-align: center;">
            <a href="{% url 'login' %}" style="color: var(--sidebar-text); text-decoration: none; font-size: 0.875rem;">Return to Login</a>
        </div>
    </div>
</div>
{% endblock %}
