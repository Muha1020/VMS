{% extends 'base.html' %}

{% block content %}
<div class="premium-card-shell" style="max-width: 500px; margin: 4rem auto;">
    <div class="premium-card-core" style="text-align: center;">
        <i class="ph ph-envelope-simple-open" style="font-size: 4rem; color: var(--accent); margin-bottom: 1rem;"></i>
        <h2 class="premium-title">Check Your Email</h2>
        <p class="premium-subtitle">We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.</p>
        
        <div style="margin-top: 2rem;">
            <a href="{% url 'login' %}" class="premium-btn w-100" style="justify-content: center;">
                Return to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
