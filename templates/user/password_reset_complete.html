{% extends 'base.html' %}

{% block content %}
<div class="premium-card-shell" style="max-width: 500px; margin: 4rem auto;">
    <div class="premium-card-core" style="text-align: center;">
        <i class="ph ph-check-circle" style="font-size: 4rem; color: #22C55E; margin-bottom: 1rem;"></i>
        <h2 class="premium-title">Password Reset Complete</h2>
        <p class="premium-subtitle">Your password has been set. You may go ahead and log in now.</p>
        
        <div style="margin-top: 2rem;">
            <a href="{% url 'login' %}" class="premium-btn w-100" style="justify-content: center;">
                Log in
            </a>
        </div>
    </div>
</div>
{% endblock %}
